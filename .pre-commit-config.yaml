repos:
  - repo: https://github.com/psf/black
    rev: 24.4.2
    hooks:
      - id: black
        language_version: python3
        args: ["--target-version", "py39"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.8
    hooks:
      - id: ruff
        args: ["--fix", "--exit-non-zero-on-fix"]

  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.9
    hooks:
      - id: bandit
        args: ["-c", "pyproject.toml", "--quiet"]
        additional_dependencies: ["bandit[toml]"]
        exclude: "tests/"

  # E-4: TAXONOMY integrity check (docs/TAXONOMY.md が単一源泉)
  - repo: local
    hooks:
      - id: taxonomy-check
        name: taxonomy integrity check
        entry: python3 scripts/check_taxonomy.py
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]
        description: >-
          docs/TAXONOMY.md に反する用語・フェーズ表記を検出する。
          エラーがあれば commit を中止する (警告は info-only)。
