<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#6C5CE7">
<link rel="manifest" href="/static/manifest.json">
<link rel="apple-touch-icon" href="/static/apple-touch-icon.png">
<title>アイ</title>
<style>
  :root {
    --bg: #FFFFFF;
    --panel: #F5F3F8;
    --accent: #6C5CE7;
    --accent2: #A29BFE;
    --text: #2D2D3F;
    --subtext: #8E8EA0;
    --ai-bubble: #F0EEFF;
    --user-bubble: #E8F4FD;
    --border: #E5E5EA;
    --success: #34C759;
    --danger: #FF3B30;
    --radius: 18px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ── ヘッダー ── */
  header {
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  header .avatar {
    width: 40px; height: 40px;
    background: var(--accent);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 18px; font-weight: bold;
  }
  header .info { flex: 1; }
  header .name { font-size: 17px; font-weight: 700; color: var(--text); }
  header .status { font-size: 12px; color: var(--subtext); }
  header .status .dot {
    display: inline-block; width: 7px; height: 7px;
    background: var(--success); border-radius: 50%;
    margin-right: 4px; vertical-align: middle;
  }
  #emotion-badge {
    font-size: 13px; color: var(--subtext);
    background: var(--panel); padding: 4px 12px;
    border-radius: 20px;
  }

  /* ── チャットエリア ── */
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 16px 16px 8px;
    -webkit-overflow-scrolling: touch;
  }

  .msg {
    display: flex;
    margin-bottom: 12px;
    gap: 8px;
    animation: fadeIn 0.25s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

  .msg.ai { justify-content: flex-start; }
  .msg.user { justify-content: flex-end; }

  .msg .icon {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: var(--accent);
    color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: bold;
    flex-shrink: 0;
    align-self: flex-end;
  }
  .msg.user .icon {
    background: var(--accent2);
    order: 2;
  }

  .bubble {
    max-width: 78%;
    padding: 12px 16px;
    border-radius: var(--radius);
    font-size: 15px;
    line-height: 1.5;
    letter-spacing: -0.005em;
    font-feature-settings: "palt" 1;
    word-break: break-word;
  }
  .msg.ai .bubble {
    background: var(--ai-bubble);
    color: var(--text);
    border-bottom-left-radius: 4px;
  }
  .msg.user .bubble {
    background: var(--accent);
    color: #FFFFFF;
    border-bottom-right-radius: 4px;
  }

  .bubble .time {
    display: block;
    font-size: 11px;
    color: var(--subtext);
    margin-top: 4px;
  }
  .msg.user .bubble .time { color: rgba(255,255,255,0.7); }

  /* ── タイピングインジケータ ── */
  .typing { display: flex; gap: 4px; padding: 8px 0; }
  .typing span {
    width: 8px; height: 8px;
    background: var(--accent2);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.15s; }
  .typing span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-8px); }
  }

  /* ── 入力エリア ── */
  #input-area {
    background: var(--bg);
    border-top: 1px solid var(--border);
    padding: 12px 16px;
    padding-bottom: max(12px, env(safe-area-inset-bottom));
    flex-shrink: 0;
  }
  #input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }
  #msg-input {
    flex: 1;
    border: 1.5px solid var(--border);
    border-radius: 24px;
    padding: 12px 18px;
    font-size: 16px;
    font-family: inherit;
    color: var(--text);
    background: var(--bg);
    outline: none;
    resize: none;
    max-height: 120px;
    line-height: 1.4;
    transition: border-color 0.2s;
  }
  #msg-input:focus { border-color: var(--accent); }
  #msg-input::placeholder { color: var(--subtext); }

  #send-btn {
    width: 48px; height: 48px;
    border-radius: 50%;
    background: var(--accent);
    color: #fff;
    border: none;
    font-size: 20px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: background 0.2s, transform 0.1s;
  }
  #send-btn:active { transform: scale(0.92); background: var(--accent2); }
  #send-btn:disabled { background: var(--border); cursor: default; }

  /* ── マイクボタン ── */
  #mic-btn {
    width: 48px; height: 48px;
    border-radius: 50%;
    background: var(--panel);
    color: var(--accent);
    border: 1.5px solid var(--border);
    font-size: 20px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: background 0.2s, transform 0.1s;
  }
  #mic-btn:active { transform: scale(0.92); }
  #mic-btn.listening {
    background: #FFF0F0;
    border-color: var(--danger);
    color: var(--danger);
    animation: pulse 1s infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.08); }
  }
  #mic-status {
    font-size: 12px;
    color: var(--subtext);
    text-align: center;
    margin-top: 6px;
    min-height: 16px;
  }

  /* ── ローディング ── */
  #loading {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 16px; z-index: 100;
    transition: opacity 0.4s;
  }
  #loading.hide { opacity: 0; pointer-events: none; }
  #loading .spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading p { color: var(--subtext); font-size: 14px; }
</style>
</head>
<body>

<!-- ローディング画面 -->
<div id="loading">
  <div class="spinner"></div>
  <p>アイを起動中...</p>
</div>

<!-- ヘッダー -->
<header>
  <div class="avatar">ア</div>
  <div class="info">
    <div class="name">アイ</div>
    <div class="status"><span class="dot"></span>オンライン</div>
  </div>
  <div id="emotion-badge">😊 元気</div>
</header>

<!-- チャットエリア -->
<div id="chat"></div>

<!-- 入力エリア -->
<div id="input-area">
  <div id="input-row">
    <button id="mic-btn" aria-label="音声入力">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
        <line x1="12" y1="19" x2="12" y2="23"/>
        <line x1="8" y1="23" x2="16" y2="23"/>
      </svg>
    </button>
    <textarea id="msg-input" rows="1" placeholder="メッセージを入力..."
              enterkeyhint="send"></textarea>
    <button id="send-btn" aria-label="送信">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>
  <div id="mic-status"></div>
</div>

<script>
const chatEl = document.getElementById('chat');
const input = document.getElementById('msg-input');
const sendBtn = document.getElementById('send-btn');
const micBtn = document.getElementById('mic-btn');
const micStatus = document.getElementById('mic-status');
const loadingEl = document.getElementById('loading');
const emotionBadge = document.getElementById('emotion-badge');

let sending = false;

// ── 音声認識（Web Speech API） ──
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition = null;
let isListening = false;

if (SpeechRecognition) {
  recognition = new SpeechRecognition();
  recognition.lang = 'ja-JP';
  recognition.continuous = false;
  recognition.interimResults = true;

  recognition.onstart = () => {
    isListening = true;
    micBtn.classList.add('listening');
    micStatus.textContent = '🎤 話してください...';
    input.placeholder = '聞いています...';
  };

  recognition.onresult = (e) => {
    let interim = '';
    let final = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const t = e.results[i][0].transcript;
      if (e.results[i].isFinal) final += t;
      else interim += t;
    }
    // 途中結果は下に表示
    if (interim) micStatus.textContent = '🎤 ' + interim;
    // 確定したら入力欄に反映（編集できるよう自動送信はしない）
    if (final) {
      input.value = (input.value + final).trim();
      autoResize();
      micStatus.textContent = '✅ 確認してから送信ボタンを押してね';
    }
  };

  recognition.onend = () => {
    isListening = false;
    micBtn.classList.remove('listening');
    micStatus.textContent = '';
    input.placeholder = 'メッセージを入力...';
  };

  recognition.onerror = (e) => {
    isListening = false;
    micBtn.classList.remove('listening');
    const msgs = { 'no-speech': '声が聞こえなかったよ', 'not-allowed': 'マイクの許可が必要です', 'network': 'ネットワークエラー' };
    micStatus.textContent = msgs[e.error] || 'エラー: ' + e.error;
    input.placeholder = 'メッセージを入力...';
    setTimeout(() => { micStatus.textContent = ''; }, 3000);
  };

  micBtn.addEventListener('click', () => {
    if (isListening) {
      recognition.stop();
    } else {
      input.value = '';
      recognition.start();
    }
  });
} else {
  // Web Speech API 非対応ブラウザ
  micBtn.style.display = 'none';
}

// ── ユーティリティ ──
function now() {
  const d = new Date();
  return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
}

function scrollBottom() {
  requestAnimationFrame(() => chatEl.scrollTop = chatEl.scrollHeight);
}

function addMsg(text, isAi) {
  const div = document.createElement('div');
  div.className = `msg ${isAi ? 'ai' : 'user'}`;

  const icon = document.createElement('div');
  icon.className = 'icon';
  icon.textContent = isAi ? 'ア' : 'あ';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;

  const time = document.createElement('span');
  time.className = 'time';
  time.textContent = now();
  bubble.appendChild(time);

  if (isAi) {
    div.appendChild(icon);
    div.appendChild(bubble);
  } else {
    div.appendChild(bubble);
    div.appendChild(icon);
  }
  chatEl.appendChild(div);
  scrollBottom();
  return div;
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'msg ai';
  div.id = 'typing';

  const icon = document.createElement('div');
  icon.className = 'icon';
  icon.textContent = 'ア';

  const dots = document.createElement('div');
  dots.className = 'typing';
  dots.innerHTML = '<span></span><span></span><span></span>';

  div.appendChild(icon);
  div.appendChild(dots);
  chatEl.appendChild(div);
  scrollBottom();
}

function hideTyping() {
  const el = document.getElementById('typing');
  if (el) el.remove();
}

function updateEmotion(emotion) {
  if (!emotion || !emotion.state) return;
  // サーバーからの emoji + label を使う
  if (emotion.emoji && emotion.label) {
    emotionBadge.textContent = `${emotion.emoji} ${emotion.label}`;
  }
}

// ── API ──
async function apiChat(message, fromVoice = false) {
  const res = await fetch('/api/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ message, from_voice: fromVoice }),
  });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

async function apiGreeting() {
  const res = await fetch('/api/greeting');
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

async function apiEmotion() {
  const res = await fetch('/api/emotion');
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

// ── 送信ハンドラ ──
let lastSentFromVoice = false;

async function send(fromVoice = false) {
  const text = input.value.trim();
  if (!text || sending) return;

  sending = true;
  sendBtn.disabled = true;
  lastSentFromVoice = fromVoice;
  input.value = '';
  autoResize();

  addMsg(text, false);
  showTyping();

  try {
    const data = await apiChat(text, fromVoice);
    hideTyping();
    addMsg(data.reply, true);

    // 感情更新（失敗してもチャットには影響させない）
    try {
      const emo = await apiEmotion();
      updateEmotion(emo);
    } catch (_) { /* emotion badge is non-critical */ }
  } catch (e) {
    hideTyping();
    addMsg('ごめんね、エラーが起きちゃった...', true);
    console.error(e);
  }

  sending = false;
  sendBtn.disabled = false;
  input.focus();
}

// ── テキストエリア自動リサイズ ──
function autoResize() {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 120) + 'px';
}
input.addEventListener('input', autoResize);

// ── Enter で送信（Shift+Enter は改行） ──
input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    send();
  }
});

sendBtn.addEventListener('click', () => {
  // マイクで入力した内容がある場合は from_voice フラグを立てて送信
  const fromVoice = micStatus.textContent.includes('✅');
  micStatus.textContent = '';
  send(fromVoice);
});

// ── 初期化 ──
async function init() {
  try {
    // ヘルスチェック（AiChan準備待ち）
    let ready = false;
    for (let i = 0; i < 60; i++) {
      try {
        const h = await fetch('/api/health');
        const data = await h.json();
        if (data.llm_loaded) { ready = true; break; }
      } catch {}
      await new Promise(r => setTimeout(r, 2000));
    }

    loadingEl.classList.add('hide');

    if (!ready) {
      addMsg('まだ準備中みたい...もう少し待ってからリロードしてね', true);
      return;
    }

    // 挨拶を取得（タイピング表示しながら待つ）
    showTyping();
    try {
      const g = await apiGreeting();
      hideTyping();
      addMsg(g.greeting, true);
    } catch (_) {
      hideTyping();
      addMsg('こんにちは！今日も話しかけてね。', true);
    }

    // 感情を取得
    try {
      const emo = await apiEmotion();
      updateEmotion(emo);
    } catch (_) {}

    input.focus();
  } catch (e) {
    loadingEl.classList.add('hide');
    addMsg('接続できなかったよ...', true);
    console.error(e);
  }
}

init();
</script>
</body>
</html>
